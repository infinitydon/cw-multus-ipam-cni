apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: n2-static
  namespace: core5g
spec:
  config: |
    {
      "cniVersion": "0.4.0",
      "name": "n2-static",
      "type": "cw-multinet",
      "vni": 2002,
      "ipam": {
        "type": "static",
        "addresses": [
          { "address": "10.20.2.10/24" }
        ]
      }
    }
---
apiVersion: v1
kind: Pod
metadata:
  name: n2-static-smoke
  namespace: core5g
  annotations:
    k8s.v1.cni.cncf.io/networks: n2-static
spec:
  restartPolicy: Never
  containers:
    - name: shell
      image: ghcr.io/nicolaka/netshoot:latest
      command: ["sleep", "3600"]
