apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: n2-whereabouts
  namespace: core5g
spec:
  config: |
    {
      "cniVersion": "0.4.0",
      "name": "n2-whereabouts",
      "type": "cw-multinet",
      "vni": 3002,
      "ipam": {
        "type": "whereabouts",
        "range": "10.30.2.0/24",
        "exclude": ["10.30.2.0/28"]
      }
    }
---
