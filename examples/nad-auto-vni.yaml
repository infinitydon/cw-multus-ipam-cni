apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: n2-auto-vni
  namespace: core5g
spec:
  config: |
    {
      "cniVersion": "0.4.0",
      "name": "n2-auto-vni",
      "type": "cw-multinet",
      "capabilities": { "ips": true },
      "mtu": 1450,
      "vxlanPort": 14789,
      "ipam": {
        "type": "whereabouts",
        "range": "10.30.2.0/24",
        "exclude": ["10.30.2.0/28"]
      }
    }
