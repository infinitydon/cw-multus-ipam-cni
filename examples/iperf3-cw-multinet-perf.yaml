apiVersion: v1
kind: Namespace
metadata:
  name: cw-multinet-perf
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: perf-net
  namespace: cw-multinet-perf
spec:
  config: |
    {
      "cniVersion": "0.4.0",
      "name": "perf-net",
      "type": "cw-multinet",
      "capabilities": { "ips": true },
      "vni": 6301,
      "mtu": 1450,
      "vxlanPort": 14789,
      "ipam": {
        "type": "static",
        "addresses": []
      }
    }
---
apiVersion: v1
kind: Pod
metadata:
  name: iperf3-server
  namespace: cw-multinet-perf
  labels:
    app: iperf3-server
  annotations:
    k8s.v1.cni.cncf.io/networks: '[{ "name": "perf-net", "interface": "perf0", "ips": ["10.250.0.10/24"] }]'
spec:
  nodeSelector:
    kubernetes.io/hostname: g46cd14
  containers:
  - name: iperf3
    image: ghcr.io/nicolaka/netshoot:latest
    imagePullPolicy: IfNotPresent
    command:
    - /bin/sh
    - -c
    args:
    - exec iperf3 -s -B 10.250.0.10 -p 5201
    ports:
    - name: iperf3
      containerPort: 5201
      protocol: TCP
  restartPolicy: Always
---
apiVersion: v1
kind: Pod
metadata:
  name: iperf3-client
  namespace: cw-multinet-perf
  labels:
    app: iperf3-client
  annotations:
    k8s.v1.cni.cncf.io/networks: '[{ "name": "perf-net", "interface": "perf0", "ips": ["10.250.0.20/24"] }]'
spec:
  nodeSelector:
    kubernetes.io/hostname: g80b396
  containers:
  - name: client
    image: ghcr.io/nicolaka/netshoot:latest
    imagePullPolicy: IfNotPresent
    command:
    - /bin/sh
    - -c
    args:
    - sleep infinity
  restartPolicy: Always
