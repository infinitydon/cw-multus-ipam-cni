apiVersion: v1
kind: Namespace
metadata:
  name: cw-multinet-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cw-multinet-cni
  namespace: cw-multinet-system
  labels:
    app.kubernetes.io/name: cw-multinet-cni
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cw-multinet-cni
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cw-multinet-cni
    spec:
      serviceAccountName: cw-multinet-agent
      hostNetwork: true
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists
      containers:
        - name: installer
          image: ghcr.io/infinitydon/cw-multus-ipam-cni:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              cp /cw-multinet /host/opt/cni/bin/cw-multinet
              chmod 0755 /host/opt/cni/bin/cw-multinet
              sleep infinity
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-root
              mountPath: /host
        - name: agent
          image: ghcr.io/infinitydon/cw-multus-ipam-cni:latest
          imagePullPolicy: Always
          command:
            - /cw-multinet-agent
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: VXLAN_PREFIX
              value: vx-cwm-
            - name: BRIDGE_PREFIX
              value: br-cwm-
            - name: SYNC_PERIOD
              value: 30s
            - name: DISABLE_BRIDGE_NETFILTER
              value: "true"
            - name: PREWARM_NADS
              value: "false"
            - name: AUTO_ALLOCATE_VNI
              value: "true"
            - name: ALLOCATOR_LEADER_ELECTION
              value: "true"
            - name: ALLOCATOR_LEASE_NAME
              value: cw-multinet-vni-allocator
            - name: VNI_RANGE_START
              value: "10000"
            - name: VNI_RANGE_END
              value: "16777215"
          securityContext:
            privileged: true
      volumes:
        - name: host-root
          hostPath:
            path: /
            type: Directory
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cw-multinet-agent
  namespace: cw-multinet-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cw-multinet-agent
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["k8s.cni.cncf.io"]
    resources: ["network-attachment-definitions"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cw-multinet-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cw-multinet-agent
subjects:
  - kind: ServiceAccount
    name: cw-multinet-agent
    namespace: cw-multinet-system
