apiVersion: v1
kind: Namespace
metadata:
  name: cw-multinet-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cw-multinet-cni
  namespace: cw-multinet-system
  labels:
    app.kubernetes.io/name: cw-multinet-cni
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cw-multinet-cni
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cw-multinet-cni
    spec:
      hostNetwork: true
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists
      containers:
        - name: installer
          image: ghcr.io/replace-me/cw-multus-ipam-cni:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              cp /cw-multinet /host/opt/cni/bin/cw-multinet
              chmod 0755 /host/opt/cni/bin/cw-multinet
              sleep infinity
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-root
              mountPath: /host
      volumes:
        - name: host-root
          hostPath:
            path: /
            type: Directory
