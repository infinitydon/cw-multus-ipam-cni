apiVersion: v1
kind: Namespace
metadata:
  name: cw-multinet-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cw-multinet-cni
  namespace: cw-multinet-system
  labels:
    app.kubernetes.io/name: cw-multinet-cni
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cw-multinet-cni
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cw-multinet-cni
    spec:
      serviceAccountName: cw-multinet-agent
      hostNetwork: true
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists
      containers:
        - name: installer
          image: ghcr.io/infinitydon/cw-multus-ipam-cni:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              cp /cw-multinet /host/opt/cni/bin/cw-multinet
              chmod 0755 /host/opt/cni/bin/cw-multinet
              sleep infinity
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-root
              mountPath: /host
        - name: agent
          image: ghcr.io/infinitydon/cw-multus-ipam-cni:latest
          imagePullPolicy: Always
          command:
            - /cw-multinet-agent
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: VXLAN_PREFIX
              value: vx-cwm-
            - name: BRIDGE_PREFIX
              value: br-cwm-
            - name: SYNC_PERIOD
              value: 30s
            - name: DISABLE_BRIDGE_NETFILTER
              value: "true"
          securityContext:
            privileged: true
      volumes:
        - name: host-root
          hostPath:
            path: /
            type: Directory
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cw-multinet-agent
  namespace: cw-multinet-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cw-multinet-agent
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cw-multinet-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cw-multinet-agent
subjects:
  - kind: ServiceAccount
    name: cw-multinet-agent
    namespace: cw-multinet-system
