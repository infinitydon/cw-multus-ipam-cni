apiVersion: v1
kind: Namespace
metadata:
  name: kubevirt-cw-test
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: vm-cw-net
  namespace: kubevirt-cw-test
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "vm-cw-net",
      "type": "cw-multinet",
      "mtu": 1450,
      "ipam": {
        "type": "whereabouts",
        "range": "10.254.57.0/24",
        "exclude": ["10.254.57.0/28"]
      }
    }
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: cwm-vm-a
  namespace: kubevirt-cw-test
  labels:
    app: cwm-vm-a
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        kubevirt.io/domain: cwm-vm-a
    spec:
      nodeSelector:
        kubernetes.io/hostname: g46cd14
      domain:
        devices:
          interfaces:
            - name: default
              masquerade: {}
              macAddress: "02:00:00:57:00:0a"
            - name: cwmnet
              bridge: {}
              macAddress: "02:00:00:57:00:1a"
          disks:
            - name: containerdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
        resources:
          requests:
            memory: 2Gi
      networks:
        - name: default
          pod: {}
        - name: cwmnet
          multus:
            networkName: vm-cw-net
      volumes:
        - name: containerdisk
          containerDisk:
            image: quay.io/kubevirt/fedora-container-disk-images:35
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              hostname: cwm-vm-a
              user: fedora
              password: fedora
              chpasswd:
                expire: false
              ssh_pwauth: true
              runcmd:
                - [ sh, -c, "sleep 15; echo CW-MULTINET-REPORT-START cwm-vm-a > /dev/ttyS0; ip -br addr > /dev/ttyS0; ping -c 3 -W 2 10.254.57.17 > /dev/ttyS0 2>&1; echo CW-MULTINET-REPORT-END cwm-vm-a > /dev/ttyS0" ]
            networkData: |
              version: 2
              ethernets:
                nic0:
                  match:
                    macaddress: "02:00:00:57:00:0a"
                  set-name: eth0
                  dhcp4: true
                  dhcp6: false
                nic1:
                  match:
                    macaddress: "02:00:00:57:00:1a"
                  set-name: eth1
                  dhcp4: true
                  dhcp6: false
---
