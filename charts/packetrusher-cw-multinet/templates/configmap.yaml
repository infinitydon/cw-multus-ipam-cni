apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-packetrusher
  labels:
    app: packetrusher
data:
  config.yml: |
    gnodeb:
      controlif:
        ip: "{{ .Values.config.n2network.ipAddress }}"
        port: 9487
      dataif:
        ip: "{{ .Values.config.n3network.ipAddress }}"
        port: 2152
      plmnlist:
        mcc: "{{ .Values.config.gnb.mcc }}"
        mnc: "{{ .Values.config.gnb.mnc }}"
        tac: "{{ .Values.config.gnb.tac }}"
        gnbid: "{{ .Values.config.gnb.gnbid }}"
      slicesupportlist:
        sst: "{{ .Values.config.gnb.sst }}"
        sd: "{{ .Values.config.gnb.sd }}"

    ue:
      msin: "{{ .Values.config.ue.msin }}"
      key: "{{ .Values.config.ue.key }}"
      opc: "{{ .Values.config.ue.opc }}"
      amf: "8000"
      sqn: "00000000"
      dnn: "{{ .Values.config.ue.dnn }}"
      hplmn:
        mcc: "{{ .Values.config.ue.hplmn.mcc }}"
        mnc: "{{ .Values.config.ue.hplmn.mnc }}"
      snssai:
        sst: {{ .Values.config.ue.sst }}
        sd: "{{ .Values.config.ue.sd }}"
      integrity:
        nia0: false
        nia1: false
        nia2: true
        nia3: false
      ciphering:
        nea0: true
        nea1: false
        nea2: true
        nea3: false

    amfif:
      - ip: "{{ .Values.config.amf.ipAddress }}"
        port: 38412