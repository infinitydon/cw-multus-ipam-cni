{{- $ns := .Release.Namespace }}
{{- $name := .Release.Name }}
{{- range $plane, $net := .Values.network }}
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: {{ $name }}-core-{{ $plane }}-nad
  namespace: {{ $ns }}
spec:
  config: |
    {
      "cniVersion": "0.4.0",
      "name": "{{ $name }}-core-{{ $plane }}-nad",
      "type": "cw-multinet",
      "capabilities": { "ips": true },
      "vni": {{ $net.vni }},
      "mtu": {{ $.Values.cwMultinet.mtu }},
      "vxlanPort": {{ $.Values.cwMultinet.vxlanPort }},
      "ipam": {
        "type": "static",
        "addresses": []
      }
    }
{{- end }}
